# Production docker-compose for AWS Lightsail.
# All secret values are read from .env (written by the deploy workflow).
#
# Usage on server:
#   docker compose --env-file .env -f docker-compose.prod.yml up -d
#
# Required .env vars: POSTGRES_USER, POSTGRES_PASSWORD, GROQ_API_KEY,
#   SECRET_KEY, GHCR_REPO, IMAGE_TAG

version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai-document-hub-db
    environment:
      POSTGRES_DB: ai_document_hub
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: ai-document-hub-redis
    restart: unless-stopped
    networks:
      - internal

  backend:
    image: ghcr.io/${GHCR_REPO}/backend:${IMAGE_TAG:-latest}
    container_name: ai-document-hub-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/ai_document_hub
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY}
      UPLOAD_DIR: /app/uploads
      REDIS_URL: redis://redis:6379
      PADDLE_OCR_ENABLED: "false"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal
      - public

  frontend:
    image: ghcr.io/${GHCR_REPO}/frontend:${IMAGE_TAG:-latest}
    container_name: ai-document-hub-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - public

volumes:
  postgres_data:
  uploads:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
