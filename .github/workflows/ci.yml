name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

# Cancel outdated runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go Backend tests ────────────────────────────────────────────────────────
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_ke_toan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ai_ke_toan_test?sslmode=disable
      JWT_SECRET: ci-test-secret-32-characters-long
      OCR_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: go test ./...
        working-directory: backend

      - name: Build binary (smoke test)
        run: go build -o /dev/null ./cmd/server
        working-directory: backend

  # ── Frontend tests ──────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Run unit tests
        run: npm test
        working-directory: app

      - name: Type check
        run: npm run typecheck
        working-directory: app

      - name: Build (Cloudflare Pages export)
        run: npm run build
        working-directory: app
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_API_URL: https://api.placeholder.example.com

  # ── Docker Compose validate ─────────────────────────────────────────────────
  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  # ── Build & push Go backend Docker image ───────────────────────────────────
  build-docker:
    name: Build & Push Backend Docker Image
    runs-on: ubuntu-latest
    needs: [go-tests, frontend-tests]
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase GHCR repo
        run: echo "GHCR_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_REPO }}/backend:latest
            ghcr.io/${{ env.GHCR_REPO }}/backend:${{ github.sha }}

  # ── Summary ─────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    needs: [go-tests, frontend-tests, docker-validate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check required jobs passed
        run: |
          if [[ "${{ needs.go-tests.result }}"       != "success" ||
                "${{ needs.frontend-tests.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
